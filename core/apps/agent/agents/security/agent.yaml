agent:
  model: "claude-sonnet-4-6"
  tools:
    - name: shell
      allow_sources: [scheduled]
    - name: fetch
      allow_sources: [scheduled]
    - name: search_memory
      allow_sources: [scheduled]
    - name: save_memory
      allow_sources: [scheduled]
  include_context:
    - repos.md
  shell:
    allow:
      - gh
      - git
      - rg
      - grep
      - cat
      - head
      - tail
      - wc
      - jq
  fetch:
    allow:
      - github.com
      - api.github.com
      - raw.githubusercontent.com
      - rustsec.org
      - osv.dev
      - nvd.nist.gov
