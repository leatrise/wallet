[package]
name = "img-downloader"
version = { workspace = true }
edition = { workspace = true }

[dependencies]
tokio = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
config = { workspace = true }
image = { version = "0.25.8", default-features = false, features = ["png", "jpeg", "webp"] }
resvg = { version = "0.45.1", default-features = false, features = ["text"] }
oxipng = { version = "9.1.5", default-features = false }

clap = { version = "4.6.1", features = ["derive"] }

chain_primitives = { path = "../../crates/chain_primitives" }
coingecko = { path = "../../crates/coingecko" }
primitives = { path = "../../crates/primitives" }
settings = { path = "../../crates/settings" }
gem_tracing = { path = "../../crates/tracing" }
serde_serializers = { path = "../../crates/serde_serializers" }
