name: iOS UI Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "ios/**"
      - "core"
      - "core/**"
      - ".gitmodules"
      - ".github/actions/setup-ios-ci/**"
      - ".github/actions/setup-rust-ci/**"
      - ".github/workflows/ios-ui-tests.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ios/**"
      - "core"
      - "core/**"
      - ".gitmodules"
      - ".github/actions/setup-ios-ci/**"
      - ".github/actions/setup-rust-ci/**"
      - ".github/workflows/ios-ui-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  ui_test:
    name: Build and UI Test iPhone simulator
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Setup iOS CI
        uses: ./.github/actions/setup-ios-ci

      - name: Cache Swift Package Manager
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.swiftpm
            ios/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install dependencies
        working-directory: ios
        run: just install-toolchains

      - name: Build Core
        working-directory: ios
        run: just generate-stone

      - name: Resolve SPM Dependencies
        working-directory: ios
        run: just spm-resolve

      - name: Build for Testing
        working-directory: ios
        run: just build-for-testing-integration

      - name: UI Tests
        working-directory: ios
        run: just test-integration-without-building
