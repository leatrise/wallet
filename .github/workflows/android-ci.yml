name: Android Tests

on:
  push:
    branches: ["main"]
    paths:
      - "android/**"
      - "core/**"
      - "localization/**"
      - ".gitmodules"
      - ".github/actions/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "android/**"
      - "core/**"
      - "localization/**"
      - ".gitmodules"
      - ".github/actions/**"
      - ".github/workflows/android-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  unit_test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Android CI
        uses: ./.github/actions/setup-android-ci

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Android toolchains
        run: |
          just install-toolchains
          just install-ndk

      - name: Build app
        run: just build

      - name: Verify debug APK native libraries
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/google/debug -name '*.apk' | head -n 1)
          unzip -l "$APK" | grep -q 'lib/arm64-v8a/libgemstone.so'
          unzip -l "$APK" | grep -q 'lib/armeabi-v7a/libgemstone.so'

      - name: Upload debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gem-wallet-google-debug-apk
          path: android/app/build/outputs/apk/google/debug/*.apk
          if-no-files-found: error

      - name: Run unit tests
        env:
          UNIT_TESTS: "true"
        run: just test
