name: Core CI

on:
  push:
    branches: ["main"]
    paths:
      - "core/**"
      - ".github/actions/**"
      - ".github/workflows/core-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "core/**"
      - ".github/actions/**"
      - ".github/workflows/core-ci.yml"

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Run Lint
        run: just lint

  unit_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Run tests
        run: just test

  integration_build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Build all integration tests only
        run: just build-integration-tests

      - name: Check gemstone dependencies
        run: |
          cargo tree --package gemstone | grep -i reqwest && exit 1 || echo "✓ No reqwest dependencies found in gemstone"

  check_schema:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci

      - name: Install diesel
        run: just install-diesel

      - name: Run migration
        run: |
          diesel setup
          diesel migration run
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost/postgres"

      - name: Check schema
        run: |
          git --no-pager diff
          git diff --quiet --exit-code crates/storage/src/schema.rs
