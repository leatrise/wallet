name: Publish Dynode Container

on:
  push:
    branches: ["main"]
    paths:
      - "core/apps/dynode/**"
      - "core/Cargo.lock"
      - "core/Dockerfile"
      - ".github/workflows/dynode-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  DYNODE_IMAGE: ghcr.io/gemwalletcom/dynode

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dynode
        uses: docker/build-push-action@v7
        with:
          context: ./core
          file: ./core/Dockerfile
          target: dynode
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=dynode
          cache-to: type=gha,mode=max,scope=dynode
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            ${{ env.DYNODE_IMAGE }}:latest
            ${{ env.DYNODE_IMAGE }}:${{ github.sha }}
