name: Core Lint
on:
  pull_request:
    branches: ["main"]
    paths:
      - "core/**"
      - ".github/actions/**"
      - ".github/workflows/core-lint.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy_check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Rust
        uses: ./.github/actions/setup-rust-ci
        with:
          sccache: "false"

      - name: Run Lint
        run: just lint
